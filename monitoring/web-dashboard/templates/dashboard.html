<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
}

.sidebar{
width:250px;
height:100vh;
position:fixed;
left:0;
top:0;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
padding:25px;
}

.sidebar h3{
font-weight:700;
margin-bottom:30px;
color:#60a5fa;
}

.sidebar a{
display:block;
color:#cbd5e1;
text-decoration:none;
padding:10px 0;
font-size:14px;
}

.sidebar a:hover{
color:white;
}

.main{
margin-left:260px;
padding:30px;
}

.card{
border:none;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.stat-card{
padding:20px;
}

.stat-title{
font-size:12px;
color:#6b7280;
text-transform:uppercase;
letter-spacing:1px;
}

.stat-value{
font-size:30px;
font-weight:700;
color:#2563eb;
}

.chart-box{
height:280px;
}

.session-item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.session-item:hover{
background:#f1f5f9;
}

.badge-attack{
background:#ef4444;
margin-right:5px;
}

.activity-log{
font-family:monospace;
font-size:12px;
background:#0f172a;
color:#22c55e;
padding:10px;
border-radius:8px;
margin-bottom:6px;
}

</style>
</head>

<body>

<div class="sidebar">
<h3>🚨 HPD</h3>

<a href="#" onclick="switchTab('sessions')">Sessions</a>
<a href="#" onclick="switchTab('iocs')">IOCs</a>
<a href="#" onclick="switchTab('logs')">Logs</a>
<a href="#" onclick="switchTab('services')">Services</a>
<a href="/attackers">Attackers</a>

<hr>

<div style="font-size:13px;color:#94a3b8;">
Status:
<span id="connection-status" style="color:#22c55e;">Connected</span>
</div>

<br>

<a href="/logout">Logout</a>
</div>

<div class="main">

<div class="container-fluid">

<div class="row mb-4">

<div class="col-md-3">
<div class="card stat-card">
<div class="stat-title">Total Sessions</div>
<div class="stat-value" id="stat-sessions">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
<div class="stat-title">Detected IOCs</div>
<div class="stat-value" id="stat-iocs">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
<div class="stat-title">Packet Captures</div>
<div class="stat-value" id="stat-pcaps">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
<div class="stat-title">Recent Activity</div>
<div class="stat-value" id="stat-activity">0</div>
</div>
</div>

</div>

<div id="sessions" class="tab-content">

<div class="row">

<div class="col-lg-8 mb-4">
<div class="card p-3">
<h6>Session Activity</h6>
<div class="chart-box">
<canvas id="sessionsChart"></canvas>
</div>
</div>
</div>

<div class="col-lg-4 mb-4">
<div class="card p-3">
<h6>Attack Ratio</h6>
<div class="chart-box">
<canvas id="attackRatioChart"></canvas>
</div>
</div>
</div>

</div>

<div class="row">
<div class="col-lg-12 mb-4">
<div class="card p-3">
<h6>World Map</h6>
<div class="world-map" id="worldMap" style="height:400px;"></div>
</div>
</div>
</div>

<div class="row">

<div class="col-lg-8">
<div class="card p-3">
<h6>Recent Sessions</h6>
<div id="sessionsList"></div>
</div>
</div>

<div class="col-lg-4">
<div class="card p-3">
<h6>Top Countries</h6>
<div id="countryList"></div>
</div>
</div>

</div>

</div>

<div id="iocs" class="tab-content" style="display:none;">
<div class="card p-3">
<h6>Detected IOCs</h6>
<div id="iocsList"></div>
</div>
</div>

<div id="logs" class="tab-content" style="display:none;">
<div class="card p-3">
<h6>System Logs</h6>
<div id="logsList"></div>
</div>
</div>

<div id="services" class="tab-content" style="display:none;">
<div class="card p-3">
<h6>Service Status</h6>
<div id="servicesList"></div>
</div>
</div>

</div>

</div>

<script>

const socket = io();

let sessionsChart=null;
let attackRatioChart=null;
let allSessions=[];
let map=null;

socket.on('connect',()=>{
document.getElementById("connection-status").textContent="Connected";
loadData();
});

socket.on('disconnect',()=>{
document.getElementById("connection-status").textContent="Disconnected";
});

socket.on('stats_update',(stats)=>{
document.getElementById("stat-sessions").textContent=stats.total_sessions||0;
document.getElementById("stat-iocs").textContent=stats.total_iocs||0;
document.getElementById("stat-pcaps").textContent=stats.total_pcaps||0;
document.getElementById("stat-activity").textContent=stats.recent_activity||0;
});

function switchTab(tab){

document.querySelectorAll(".tab-content").forEach(el=>el.style.display="none");
document.getElementById(tab).style.display="block";

loadData();

}

async function loadData(){

const res=await fetch("/api/sessions?limit=100");
allSessions=await res.json();

renderSessions();
renderCountryList();
updateCharts();

}

function renderSessions(){

const list=document.getElementById("sessionsList");

list.innerHTML=allSessions.slice(0,20).map(s=>{

return `
<div class="session-item">
<strong>${s.protocol||"session"}</strong>
<br>
IP: ${s.client_ip||"unknown"}
<br>
Commands: ${s.commands?.length||0}
</div>
`;

}).join("");

}

function renderCountryList(){

const map={};

allSessions.forEach(s=>{
if(s.location?.country){
map[s.location.country]=(map[s.location.country]||0)+1;
}
});

const list=document.getElementById("countryList");

list.innerHTML=Object.entries(map)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)
.map(([c,v])=>`<div>${c} — <b>${v}</b></div>`)
.join("");

}

function updateCharts(){

const ctx=document.getElementById("sessionsChart");

if(sessionsChart) sessionsChart.destroy();

sessionsChart=new Chart(ctx,{
type:"line",
data:{
labels:allSessions.map((_,i)=>i),
datasets:[{
data:allSessions.map(()=>1),
borderColor:"#3b82f6",
fill:true
}]
},
options:{plugins:{legend:{display:false}}}
});

const ctx2=document.getElementById("attackRatioChart");

if(attackRatioChart) attackRatioChart.destroy();

attackRatioChart=new Chart(ctx2,{
type:"doughnut",
data:{
labels:["SSH","HTTP","Other"],
datasets:[{
data:[5,3,2],
backgroundColor:["#ef4444","#f59e0b","#60a5fa"]
}]
}
});

}

function initMap(){
map = L.map('worldMap').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Add some example markers for testing
addAttackMarker(37.7749, -122.4194, "San Francisco, 192.168.1.100");
addAttackMarker(51.5074, -0.1278, "London, 10.0.0.50");
addAttackMarker(35.6762, 139.6503, "Tokyo, 172.16.0.25");
}

function addAttackMarker(lat, lon, label) {
L.circleMarker([lat, lon], {
radius: 6,
color: "red",
fillOpacity: 0.8
})
.addTo(map)
.bindPopup(label);
}

setInterval(loadData,30000);

loadData();

// Initialize map after DOM is ready
document.addEventListener('DOMContentLoaded', initMap);

</script>

</body>
</html>
